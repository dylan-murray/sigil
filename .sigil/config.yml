version: 1
model: openrouter/xiaomi/mimo-v2-pro
boldness: experimental
focus:
- tests
- dead_code
- security
- docs
- types
- features
- refactoring
max_prs_per_run: 5
max_issues_per_run: 0
max_ideas_per_run: 15
idea_ttl_days: 180
post_hooks:
- uv run ruff format .
- uv run pytest tests/unit -x -q
max_retries: 1
max_parallel_agents: 5
agents:
  codegen:
    model: anthropic/claude-sonnet-4-6
  validator:
    model: anthropic/claude-sonnet-4-6
