name: "Sigil — Autonomous Repo Improvement"
description: "Run Sigil to analyze your repo and open PRs/issues for improvements"
branding:
  icon: "zap"
  color: "purple"

inputs:
  anthropic-api-key:
    description: "Anthropic API key (sets ANTHROPIC_API_KEY)"
    required: false
  openai-api-key:
    description: "OpenAI API key (sets OPENAI_API_KEY)"
    required: false
  model:
    description: "Model to use (passed as --model flag, e.g. anthropic/claude-sonnet-4-6)"
    required: false
  dry-run:
    description: "Run in dry-run mode (no PRs/issues created)"
    required: false
    default: "false"
  sigil-version:
    description: "Sigil package spec for uv install (default: install from GitHub main)"
    required: false
    default: "sigil @ git+https://github.com/dylan-murray/sigil.git"

# MCP server credentials:
# If your .sigil/config.yml uses ${VAR} interpolation for MCP server
# credentials, set those variables as `env:` on the calling workflow step.
# They are automatically forwarded to `sigil run`. Example:
#
#   - uses: dylan-murray/sigil@main
#     with:
#       anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
#     env:
#       SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
#       JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}

runs:
  using: "composite"
  steps:
    - name: Set up Node (for MCP stdio servers)
      uses: actions/setup-node@v5
      with:
        node-version: "20"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install Sigil
      shell: bash
      env:
        SIGIL_VERSION: ${{ inputs.sigil-version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
        uv tool install "$SIGIL_VERSION"

    - name: Run Sigil
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GITHUB_TOKEN: ${{ github.token }}
        SIGIL_MODEL: ${{ inputs.model }}
        SIGIL_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        ARGS=""
        if [ -n "$SIGIL_MODEL" ]; then
          ARGS="$ARGS --model $SIGIL_MODEL"
        fi
        if [ "$SIGIL_DRY_RUN" = "true" ]; then
          ARGS="$ARGS --dry-run"
        fi
        sigil run $ARGS
