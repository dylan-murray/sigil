name: "Sigil — Autonomous Repo Improvement"
description: "Run Sigil to analyze your repo and open PRs/issues for improvements"
branding:
  icon: "zap"
  color: "purple"

inputs:
  github-token:
    description: >
      Token for git operations and PR creation. Defaults to github.token,
      but PRs created with the default token won't trigger CI workflows.
      Pass a Personal Access Token (PAT) to trigger CI on Sigil PRs.
    required: false
    default: ${{ github.token }}
  dry-run:
    description: "Run in dry-run mode (no PRs/issues created)"
    required: false
    default: "false"
  sigil-version:
    description: "Sigil package spec for uv install (default: install from GitHub main)"
    required: false
    default: "sigil-py"

# LLM API keys:
# Sigil uses LiteLLM, which reads API keys from standard environment variables.
# Pass whichever key your model provider requires as `env:` on the step.
# The model itself is configured in .sigil/config.yml.
#
# Examples:
#   env:
#     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}      # Anthropic
#     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}            # OpenAI
#     OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}    # OpenRouter
#     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}            # Google Gemini
#
# MCP server credentials:
# If your .sigil/config.yml uses ${VAR} interpolation for MCP server
# credentials, pass those as `env:` too:
#   env:
#     SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

runs:
  using: "composite"
  steps:
    - name: Set up Node (for MCP stdio servers)
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install Sigil
      shell: bash
      env:
        SIGIL_VERSION: ${{ inputs.sigil-version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
        git config --global user.name "sigil[bot]"
        git config --global user.email "sigil[bot]@users.noreply.github.com"
        uv tool install "$SIGIL_VERSION"

    - name: Run Sigil
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        FORCE_COLOR: "1"
        SIGIL_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        if [ "$SIGIL_DRY_RUN" = "true" ]; then
          sigil run --dry-run
        else
          sigil run
        fi
