name: Sigil

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sigil:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dylanmurray/sigil@main
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
